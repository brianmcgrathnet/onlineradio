<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Morse Lake Radio</title>
  <style>

    html, body { 
        margin: 0; 
        padding: 0;
        height: 100%; 
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .logo { 
        object-fit: cover; /* This makes it stretch without distortion */ 
    }

    .listen-btn {
      display: inline-block;
      background: #ff6600;
      color: white;
      padding: 18px 40px;
      font-size: 22px;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 20px;
    }

    .tagline {
      font-size: 20px;
      margin-top: 10px;
      color: #444;
    }

    footer {
      margin-top: 60px;
      font-size: 14px;
      color: #666;
    }

    footer a {
      color: #666;
      text-decoration: none;
      margin: 0 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Replace with your logo -->
    <img src="welcome_to_cicero.jpg" alt="CMLC Radio" class="logo">

    <h1>CMLR Radio</h1>
    <p class="tagline">Serving Cicero and the Morse Lake Communities</p>

    <a class="listen-btn" href="YOUR_STREAM_URL_HERE" target="_blank">
      ▶ Listen Live
    </a>

    <footer>
      <p>
        <a href="#">Contact</a> |
        <a href="#">About</a> |
        <a href="#">Privacy</a>
      </p>
      <p>© 2026 Morse Lake Radio</p>
    </footer>
  </div>

</body>
</html>
